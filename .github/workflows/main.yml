name: Utils CI

on:
  push:
    branches: [main]
  pull-request:
    branches: '*'

jobs:

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 14
          registry-url: https://npm.pkg.github.com/
          scope: '@nevillegallimore'
      - run: npm install
      - run: npm run test

  publish:
    if: ${{ github.ref == 'refs/head/main' }}
    runs-on: ubuntu-latest
    needs: [unit-test]
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 14
          registrty-url: https://npm.pkg.github.com/
          scope: '@nevillegallimore'
      - run: npm install
      - run: npm run build
      - run: npm run semantic-release
        env:
          NODE_AUTH_TOKEN: ${{secrets.GITHUB_TOKEN}}
